name: Release

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: OKRA ${{ github.ref_name }}
          releaseBody: |
            Descarga e instala `okrapk_*_x64-setup.exe`.

            > Windows puede mostrar una advertencia de SmartScreen — click en "Más información" → "Ejecutar de todas formas".
          releaseDraft: false
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
